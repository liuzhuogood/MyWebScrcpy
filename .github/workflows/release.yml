name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的 tag 时触发

permissions:
  contents: write  # 需要写权限来创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: macos-amd64
          - goos: darwin
            goarch: arm64
            suffix: macos-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output_name="mywebscrcpy-${{ matrix.suffix }}"
          go build -ldflags="-s -w" -o "${output_name}" .
          echo "BINARY_NAME=${output_name}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: mywebscrcpy-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version.md as release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_FILE="docs/versions/${TAG}-feature/version.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Found release notes at $NOTES_FILE"
          else
            echo "::warning::No version.md found at $NOTES_FILE, falling back to auto-generated notes."
            NOTES_FILE=""
          fi
          echo "notes_file=${NOTES_FILE}" >> $GITHUB_OUTPUT
          echo "use_version_md=$([ -n "$NOTES_FILE" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Create Release (with version.md)
        if: steps.notes.outputs.use_version_md == 'true'
        uses: softprops/action-gh-release@v1
        with:
          body_path: docs/versions/${{ github.ref_name }}-feature/version.md
          files: |
            artifacts/linux-amd64/mywebscrcpy-linux-amd64
            artifacts/linux-arm64/mywebscrcpy-linux-arm64
            artifacts/macos-amd64/mywebscrcpy-macos-amd64
            artifacts/macos-arm64/mywebscrcpy-macos-arm64
            artifacts/windows-amd64.exe/mywebscrcpy-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (fallback, auto-generated)
        if: steps.notes.outputs.use_version_md != 'true'
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            artifacts/linux-amd64/mywebscrcpy-linux-amd64
            artifacts/linux-arm64/mywebscrcpy-linux-arm64
            artifacts/macos-amd64/mywebscrcpy-macos-amd64
            artifacts/macos-arm64/mywebscrcpy-macos-arm64
            artifacts/windows-amd64.exe/mywebscrcpy-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Missing DOCKERHUB_USERNAME or DOCKERHUB_TOKEN secret. Please configure them in repo Settings → Secrets → Actions."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mywebscrcpy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mywebscrcpy:${{ steps.version.outputs.VERSION }}
