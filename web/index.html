<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>MyWebScrcpy - 设备列表</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <svg class="logo-icon" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="5" width="18" height="26" rx="3" stroke="#165dff" stroke-width="2" fill="none"/>
      <rect x="11" y="3" width="18" height="26" rx="3" stroke="#4080ff" stroke-width="1.5" fill="#f0f5ff"/>
      <circle cx="20" cy="25" r="1.5" fill="#4080ff"/>
      <path d="M14 10 L24 16 L14 22Z" fill="#165dff"/>
    </svg>
    <h1>MyWebScrcpy</h1>
    <span class="subtitle" id="device-count">加载中...</span>
    <a href="/scripts.html" class="dashboard-btn" title="脚本管理">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
      <span class="dashboard-btn-text">脚本管理</span>
    </a>
    <a href="/dashboard.html" class="dashboard-btn" title="大屏模式">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="8" height="8" rx="1"/>
        <rect x="14" y="3" width="8" height="8" rx="1"/>
        <rect x="2" y="13" width="8" height="8" rx="1"/>
        <rect x="14" y="13" width="8" height="8" rx="1"/>
      </svg>
      <span class="dashboard-btn-text">大屏模式</span>
    </a>
  </div>
  <div class="device-grid" id="device-grid"></div>

  <script>
    // ===== 设备别名 localStorage 操作 =====
    function getDeviceAliases() {
      try {
        return JSON.parse(localStorage.getItem('device_aliases') || '{}');
      } catch {
        return {};
      }
    }

    function setDeviceAlias(serial, alias) {
      const aliases = getDeviceAliases();
      if (alias && alias.trim()) {
        aliases[serial] = alias.trim();
      } else {
        delete aliases[serial];
      }
      localStorage.setItem('device_aliases', JSON.stringify(aliases));
    }

    function getDeviceAlias(serial) {
      const aliases = getDeviceAliases();
      return aliases[serial] || '';
    }

    // ===== 设备列表加载 =====
    let currentDevices = [];

    async function loadDevices() {
      try {
        const res = await fetch('/api/devices');
        const devices = await res.json();
        currentDevices = devices;
        const grid = document.getElementById('device-grid');
        document.getElementById('device-count').textContent =
          devices.length > 0 ? `${devices.length} 台设备在线` : '无设备';

        if (devices.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="big">📱</div>
              <p>未检测到在线设备</p>
              <p style="font-size:13px;margin-top:8px">请用 <code>adb connect IP:5555</code> 连接设备</p>
            </div>`;
          return;
        }

        grid.innerHTML = devices.map(d => {
          const alias = getDeviceAlias(d.serial);
          const displayName = alias || d.model || '未知设备';
          return `
          <div class="device-card" data-serial="${encodeURIComponent(d.serial)}" onclick="handleCardClick(event, '${encodeURIComponent(d.serial)}')">
            <button class="edit-btn" onclick="startEdit(event, '${encodeURIComponent(d.serial)}')" title="重命名">✏️</button>
            <div class="card-row">
              <div class="icon">📱</div>
              <div class="card-info">
                <div class="model">
                  ${alias ? `${alias}<span class="alias-badge">${d.model || '未知设备'}</span>` : displayName}
                </div>
                <div class="card-meta">
                  <span class="serial">${d.serial}</span>
                  ${d.product ? `<span class="dot-sep">·</span><span>${d.product}</span>` : ''}
                </div>
              </div>
            </div>
          </div>`;
        }).join('');
      } catch (e) {
        document.getElementById('device-count').textContent = '加载失败';
      }
    }

    // ===== 卡片点击处理 =====
    function handleCardClick(event, serial) {
      // 如果处于编辑模式，不跳转
      const card = event.currentTarget;
      if (card.classList.contains('editing')) return;
      location.href = `/player.html?serial=${serial}`;
    }

    // ===== 编辑功能 =====
    let currentEditSerial = null; // 当前正在编辑的设备

    function startEdit(event, serial) {
      event.preventDefault();
      event.stopPropagation();

      // 如果已经在编辑其他设备，先保存
      if (currentEditSerial && currentEditSerial !== serial) {
        saveEdit(event, currentEditSerial);
      }

      const card = event.target.closest('.device-card');
      if (!card || card.classList.contains('editing')) return;

      currentEditSerial = serial;
      card.classList.add('editing');
      const modelEl = card.querySelector('.model');
      const alias = getDeviceAlias(serial);
      const device = currentDevices.find(d => encodeURIComponent(d.serial) === serial);
      const originalModel = device ? (device.model || '未知设备') : '未知设备';

      modelEl.innerHTML = `
        <div class="edit-row">
          <input class="alias-input" type="text" value="${alias || originalModel}" placeholder="输入设备名称" maxlength="20">
          <button class="btn-save" onclick="saveEdit(event, '${serial}')" title="保存">✅</button>
          <button class="btn-cancel" onclick="cancelEdit(event, '${serial}')" title="取消">❌</button>
        </div>
      `;

      const input = modelEl.querySelector('.alias-input');
      input.focus();
      input.select();

      // 键盘快捷键
      input.addEventListener('keydown', (e) => {
        e.stopPropagation(); // 防止事件冒泡到 window
        if (e.key === 'Enter') {
          e.preventDefault();
          saveEdit(e, serial);
        } else if (e.key === 'Escape') {
          e.preventDefault();
          cancelEdit(e, serial);
        }
      });

      // 阻止输入框的点击事件冒泡
      input.addEventListener('click', (e) => e.stopPropagation());
    }

    function saveEdit(event, serial) {
      event.stopPropagation();
      const card = document.querySelector(`.device-card[data-serial="${serial}"]`);
      if (!card) return;

      const input = card.querySelector('.alias-input');
      const newAlias = input.value.trim();

      // 如果输入的是原始model名称，则视为删除别名
      const device = currentDevices.find(d => encodeURIComponent(d.serial) === serial);
      const originalModel = device ? (device.model || '未知设备') : '未知设备';
      if (newAlias === originalModel) {
        setDeviceAlias(serial, '');
      } else {
        setDeviceAlias(serial, newAlias);
      }

      currentEditSerial = null;
      card.classList.remove('editing');
      loadDevices();
    }

    function cancelEdit(event, serial) {
      event.stopPropagation();
      const card = document.querySelector(`.device-card[data-serial="${serial}"]`);
      if (!card) return;

      currentEditSerial = null;
      card.classList.remove('editing');
      loadDevices();
    }

    // 初始化加载
    loadDevices();
    setInterval(() => {
      // 编辑模式下跳过自动刷新，避免输入状态丢失
      if (!currentEditSerial) {
        loadDevices();
      }
    }, 3000);
  </script>
</body>
</html>
