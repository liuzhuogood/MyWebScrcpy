<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>MyWebScrcpy - 脚本管理</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <svg class="logo-icon" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="5" width="18" height="26" rx="3" stroke="#165dff" stroke-width="2" fill="none"/>
      <rect x="11" y="3" width="18" height="26" rx="3" stroke="#4080ff" stroke-width="1.5" fill="#f0f5ff"/>
      <circle cx="20" cy="25" r="1.5" fill="#4080ff"/>
      <path d="M14 10 L24 16 L14 22Z" fill="#165dff"/>
    </svg>
    <h1>脚本管理</h1>
    <span class="subtitle">分类管理 · 在线编辑</span>
    <a href="/" class="dashboard-btn" title="返回设备列表">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      <span class="dashboard-btn-text">返回</span>
    </a>
  </div>

  <div class="scripts-layout">
    <!-- 左侧：分类列表 -->
    <div class="scripts-sidebar">
      <div class="sidebar-header">
        <h3>分类</h3>
        <button id="btn-add-cat" class="icon-btn" title="新建分类">+</button>
      </div>
      <ul id="cat-list" class="cat-list"></ul>
    </div>

    <!-- 右侧：脚本列表 + 编辑器 -->
    <div class="scripts-main">
      <!-- 脚本列表视图 -->
      <div id="script-list-view">
        <div class="scripts-toolbar">
          <h3 id="current-cat-title">请选择一个分类</h3>
          <button id="btn-add-script" class="primary-btn" style="display:none">+ 新建脚本</button>
        </div>
        <ul id="script-list" class="script-list"></ul>
      </div>

      <!-- 编辑器视图 -->
      <div id="editor-view" style="display:none">
        <div class="editor-header">
          <button id="btn-back-list" class="icon-btn" title="返回脚本列表">&larr; 返回列表</button>
          <input id="script-name" class="script-name-input" type="text" placeholder="脚本名称">
        </div>
        <div class="meta-form">
          <input id="script-desc" type="text" placeholder="脚本描述（选填）" class="meta-input">
          <input id="script-params" type="text" placeholder="参数说明，例如 serial=设备序列号; mode=fast|slow（选填）" class="meta-input">
        </div>
        <div id="editor-container" class="editor-container"></div>
        <div class="editor-footer">
          <span id="editor-status" class="editor-status"></span>
          <button id="btn-save" class="primary-btn" disabled>保存</button>
          <button id="btn-delete-script" class="danger-btn">删除脚本</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/scripts.js"></script>
</body>
</html>
